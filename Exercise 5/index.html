<body>
    <h1>Exercise 5: Arrow function</h1>


    <script>
        const add = (x, y) => {
            return x + y
        }
        let result = add(99, 1)
        console.log(result);


        const division = function (c, d) {
            return c / d
        }
        let natiijo = division(100, 2)
        console.log(natiijo)
    </script>
