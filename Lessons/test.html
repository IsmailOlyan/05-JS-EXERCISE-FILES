<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const Children = [
  { name: "Mohamed", age: 7, city: "Balcad" },
  { name: "Maido", age: 5, city: "Balcad" },
  { name: "Mandek", age: 4, city: "Balcad" },
  { name: "Majid", age: 2, city: "Balcad" },
];

console.log("Properties and values of each person:");

// 1. Use for...of to loop through the array elements (the children)
for (const child of Children) {
    
    // 2. Use for...in to loop through the keys/properties of the current child object
    for (const key in child) {
        console.log(`${key}: ${child[key]}`);
    }
    
    // 3. Print a separator line after each person (except possibly the last one if you prefer)
    console.log("---");
}
    </script>
</body>
</html>
