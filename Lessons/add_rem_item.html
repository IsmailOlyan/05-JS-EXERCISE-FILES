<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 34</title>
</head>

<body>

    <h1>remove element event</h1>

    <ul class="lists">
        <li>list item </li>
        <li>list item </li>
        <li>list item </li>
        <li>list item </li>
    </ul>

    <button onclick="addItem()">addItem</button>
    <button onclick="removeItem()">removeItem</button>
    <script>



        let lists = document.querySelector('.lists')
        // console.log(lists);


        function addItem() {
            let newLists = document.createElement('li')

            newLists.textContent = "list item"
            lists.appendChild(newLists)
        }
        function removeItem() {
            if (lists.lastChild) {
                lists.removeChild(lists.lastChild)
            } else {
                alert('lists data are 0')
            }
        }
    </script>
</body>

</html>
