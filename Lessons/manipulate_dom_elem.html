<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modes</title>
</head>

<body>

    <h1>Light mode vs Dark Mode</h1>

    <p>Lorem ipsum dolor sit amet.</p>

    <button onclick="setDarkMode()">Dark Mode</button>
    <button onclick="setLightMode()">Light Mode</button>

    <script>
        let darkMode = document.querySelector('.setDarkMode')
        let lightMode = document.querySelector('.setLightMode')




        function setDarkMode() {
            document.body.style.backgroundColor = 'black'
            document.body.style.color = 'white'
        }
        function setLightMode() {
            document.body.style.backgroundColor = 'white'
            document.body.style.color = 'black'
        }

    </script>
</body>

</html>
