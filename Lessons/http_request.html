<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        async function fetchData() {
            try {
                console.log("start fetching data");
                const response = await fetch("https://jsonplaceholder.typicode.com/posts");

                // WAXAA LA SAXAY: Waxaan ku darnay ! oo ka dhigan (Haddii response-ku uusan sax ahayn)
                if (!response.ok) {
                    throw new Error(`HTTP  Error! ${response.status}`);
                }

                const data = await response.json();
                console.log(data); // Tani hadda si sax ah ayay u shaqayn doontaa

            } catch (error) {
                console.log("waxaa dhacay khalad ", error);
            }
        }

        fetchData();
    </script>
</body>

</html>
