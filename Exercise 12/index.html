    <h2>write for loop that logs each item in the array</h2>

    <script>
        let fruits = ["Apple", "Banana","Cherry"]

        for( let fruit=0; fruit < fruits.length;fruit++ ){
            console.log(fruits[fruit]);
            
        }
    </script>
