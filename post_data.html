<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>post data</title>
</head>

<body>
    <h1>HTTPS REQUEST POST </h1>

    <script>
        async function postData() {
            try {

                const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: "POST",
                    headers: {
                        'Content-Type': "application/json",
                    },
                    body: JSON.stringify({
                        title: "Olyan Dev POst",
                        body: "this is the body of my Post's Content",
                        userId: 2
                    })
                })

            
               if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`)
                }

                // waxa xiga 

                const data = await response.json()

                console.log(data)
            } catch (error) {
                console.log(error);

            }
        }

        postData()
    </script>
</body>

</html>
